 <script>
 // 封装成函数，调用时才创建Promise、启动定时器
 function getWeather() {
     return new Promise((resolve) => {
         setTimeout(() => {
             resolve({ temp: 38, conditions: 'Sunny with Clouds'})
         }, 2000)
     })
 }
 function getTweets() {
     return new Promise((resolve) => {
         setTimeout(() => {
             resolve(['I like cake', 'BBQ is good too!'])
         }, 500)
     })
 }

 //     const tweetsData = await getTweets();
 //     console.log(weatherData);
 //     console.log(tweetsData);
 //     console.timeEnd("my-operation"); // 总耗时≈2500ms
 // }
 // weather和tweets 不相互影响，两者都解决了， 再往下走
 const main = async () => {
     console.time("my-operation");
     // 一起执行
     const [weatherData, tweetsData] = 
         await Promise.all([getWeather(), getTweets()]);
     console.timeEnd("my-operation");
 }
 main();
 </script>
