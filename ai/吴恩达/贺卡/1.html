<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日贺卡生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 550px;
        }

        h1 {
            text-align: center;
            color: #ff5e7d;
            margin-bottom: 25px;
            font-size: 26px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #ff5e7d;
        }

        .generate-btn {
            width: 100%;
            padding: 14px;
            background: #ff5e7d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin: 10px 0 25px;
        }

        .generate-btn:hover {
            background: #ff3d63;
        }

        .result-box {
            padding: 25px;
            background: #fff5f7;
            border-radius: 15px;
            border-left: 5px solid #ff5e7d;
            min-height: 120px;
            line-height: 1.6;
            font-size: 17px;
            color: #444;
            margin-bottom: 15px;
        }

        .copy-btn {
            width: 100%;
            padding: 10px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .copy-btn:hover {
            background: #554fee;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <h1>🎂 专属生日贺卡生成器</h1>
        
        <div class="input-group">
            <label>对方姓名</label>
            <input type="text" id="name" placeholder="请输入姓名" required>
        </div>

        <div class="input-group">
            <label>年龄</label>
            <input type="number" id="age" placeholder="请输入年龄" required>
        </div>

        <div class="input-group">
            <label>爱好</label>
            <input type="text" id="hobby" placeholder="例如：画画、打球、干饭" required>
        </div>

        <button class="generate-btn" onclick="generateCard()">生成祝福贺卡</button>

        <!-- 贺卡展示区域 -->
        <div id="result" class="result-box">
            填写信息后点击生成按钮，你的专属生日祝福就会出现啦~
        </div>

        <button class="copy-btn" onclick="copyResult()">一键复制贺卡内容</button>
    </div>

    <script>
        // 生成生日贺卡函数
        function generateCard() {
            // 获取输入框内容
            const name = document.getElementById('name').value.trim();
            const age = document.getElementById('age').value.trim();
            const hobby = document.getElementById('hobby').value.trim();

            // 简单校验
            if (!name || !age || !hobby) {
                document.getElementById('result').innerText = "⚠️ 请填写完整的姓名、年龄和爱好哦！";
                return;
            }

            // 多套有趣的祝福语模板，随机生成
            const messages = [
                `亲爱的${name}，祝你${age}岁生日快乐！🎉 愿你永远热爱${hobby}，天天开心，万事顺遂，所有美好都如约而至！`,
                `祝${name}${age}岁生日快乐！🥳 希望${hobby}带给你无限快乐，身体健康，暴富暴美，岁岁都欢喜！`,
                `Happy Birthday to ${name}！${age}岁是超棒的年纪，继续尽情享受${hobby}的快乐吧，愿你被幸福包围！✨`,
                `${name}，${age}岁生日快乐呀！🎈 愿你在热爱${hobby}的日子里，无忧无虑，平安喜乐，年年皆胜意！`
            ];

            // 随机选一条祝福语
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('result').innerText = randomMsg;
        }

        // 一键复制功能
        function copyResult() {
            const result = document.getElementById('result').innerText;
            navigator.clipboard.writeText(result).then(() => {
                alert("✅ 贺卡内容已复制成功！");
            }).catch(err => {
                alert("复制失败，请手动复制");
            });
        }
    </script>
</body>
</html>
