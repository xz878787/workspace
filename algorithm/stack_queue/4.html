<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script >
        //创建一个空对象
        //Object 是顶层对象
        //Object.prototype 是原型对象
        // const zzh =new Object();
        // Oblect
        // console.log(zzh);
        function Person(name,age){
            //构造实例的， 实例私有的
            console.log(this);
            this.name=name;
            this.age=age;
        }
        //原型对象上的方法是公用的
        Person.prototype.poem='仁义礼智信';
        Person.prototype.say= function(){
            console.log(`我叫${this.name},我很高兴认识你`);
        }
        Person.prototype.timeMF= function(){
            console.log('时间');
        }
        const zwy =new Person('王二',18);
        console.log(zwy.toString());
        </script>
</body>
</html>
