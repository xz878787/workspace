    <script>
        //js 灵活，高级脚本语言，不太像关注内存

        // 最常用 方括号+元素
        // const arr = [1,2,3,4,5];

        // 特定的行为 adt abstract data type
        console.log(arr.push(1));
        arr.push(2);

        arr.pop();
        arr.shift();

        console.log(arr);
